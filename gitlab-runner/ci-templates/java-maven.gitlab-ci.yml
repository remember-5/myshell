# Java Maven 项目 GitLab CI/CD 模板
# 使用方式：复制此文件到项目根目录并重命名为 .gitlab-ci.yml，根据实际需求修改

image: docker:26.1.3

stages:
  - build
  - package
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=/root/.m2/repository"
  DOCKER_IMAGE_NAME: my-java-app

# 编译
build:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  script:
    - mvn $MAVEN_OPTS clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar
    expire_in: 1 hour
  cache:
    key: maven-${CI_COMMIT_REF_SLUG}
    paths:
      - /root/.m2/repository

# 构建镜像
package:
  stage: package
  dependencies:
    - build
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# 部署 (Helm 方式)
deploy:
  stage: deploy
  image:
    name: alpine/helm:3.16
    entrypoint: [""]
  variables:
    K8S_NAMESPACE: production
  script:
    - export KUBECONFIG=$(pwd)/deploy/kubeconfig.yaml
    - helm upgrade --install $CI_PROJECT_NAME ./charts/app
      --set image.tag=$CI_COMMIT_SHORT_SHA
      -n $K8S_NAMESPACE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  when: manual

# 失败通知
notify:
  stage: .post
  image: python:3.10-alpine
  script:
    - python deploy/send_email.py
  when: on_failure
  allow_failure: true
