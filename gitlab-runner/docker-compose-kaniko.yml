# 使用 Kaniko 的安全方案（无需 Docker Socket 和特权模式）
# Kaniko 可以在非特权容器中构建 Docker 镜像

services:
  gitlab-runner:
    image: gitlab/gitlab-runner:v17.11.0
    container_name: gitlab-runner-kaniko
    restart: always
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - './config:/etc/gitlab-runner'
      - 'runner-cache:/cache'
      - 'maven-cache:/root/.m2'
      - 'npm-cache:/root/.npm'
      - 'python-cache:/root/.local'
      - 'pnpm-cache:/root/.pnpm-store'
      # 注意：不再挂载 docker.sock
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    healthcheck:
      test: ["CMD", "gitlab-runner", "verify"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  runner-cache:
  maven-cache:
  npm-cache:
  python-cache:
  pnpm-cache:

